<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="converter-box">
        <h2>Temperature Converter</h2>

        <!-- Input Field -->
        <div class="input-group">
            <label>Enter Temperature</label>
            <input type="number" id="tempInput" placeholder="Eg: 25">
            <div id="errorMessage" class="error-msg">Please enter a valid number!</div>
        </div>

        <!-- Unit Selector -->
        <div class="input-group">
            <label>From Unit</label>
            <select id="unitSelect">
                <option value="Celsius">Celsius (°C)</option>
                <option value="Fahrenheit">Fahrenheit (°F)</option>
                <option value="Kelvin">Kelvin (K)</option>
            </select>
        </div>

        <!-- Convert Button -->
        <button id="convertBtn">Convert Now</button>

        <!-- Result Display Area -->
        <div id="resultArea" class="result-area">
            <h3>Converted Results</h3>
            <div id="outputs">
                <!-- Results yahan show honge -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
